service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}

# LMTP over TCP so Postfix can reach it
service lmtp {
  inet_listener lmtp {
    port = 24
  }
}

# Expose auth socket for Postfix SASL
service auth {
  inet_listener auth {
    port = 12345
  }
}

# dsync replication listener
service replicator {
  process_min_avail = 1
  unix_listener replicator-doveadm {
    mode = 0600
  }
}

service aggregator {
  fifo_listener replication-notify-fifo {
    user = vmail
  }
  unix_listener replication-notify {
    user = vmail
  }
}

service doveadm {
  inet_listener doveadm-server {
    port = 4177
  }
}
