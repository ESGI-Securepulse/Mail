###############################################################################
# Smoke-test mono-nœud, SANS haute disponibilité.
#
# Vérifie uniquement que les images Postfix/Dovecot/RoundCube démarrent,
# s'enregistrent dans etcd et acceptent des connexions. PAS de LDAP ici
# (l'authentification échouera), PAS de storage-lucien (STORAGE_MODE=local,
# volume Docker local au lieu du NFS haute dispo). Ce compose reste
# volontairement séparé/minimal — le déploiement HA réel multi-sites (LDAP,
# storage-lucien, LB-Syo, DNS) est testé dans integration/.
###############################################################################

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: mail-smoketest-etcd
    command:
      - etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  dovecot:
    build: ./dovecot
    container_name: dovecot
    restart: unless-stopped
    environment:
      ETCD_URL: http://etcd:2379
      SITE: local
      STORAGE_MODE: local
    depends_on:
      etcd: { condition: service_healthy }
    ports:
      - "15143:143"
      - "15993:993"
      - "15110:110"
      - "15995:995"
    volumes:
      - ./mail:/var/mail
      - ./certs:/etc/dovecot/certs:ro

  postfix:
    build: ./postfix
    container_name: postfix
    hostname: mail.securepulse.fr
    restart: unless-stopped
    environment:
      ETCD_URL: http://etcd:2379
      SITE: local
    depends_on:
      etcd: { condition: service_healthy }
      dovecot:
        condition: service_started
    ports:
      - "15025:25"
      - "15587:587"
    volumes:
      - ./certs:/etc/postfix/certs:ro

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    restart: unless-stopped
    depends_on:
      - dovecot
      - postfix
    ports:
      - "15080:80"
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=dovecot
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=postfix
      - ROUNDCUBEMAIL_SMTP_PORT=25
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
